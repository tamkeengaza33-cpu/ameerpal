<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    
    <!-- Gold / Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>

    <!-- Accent Glow Gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5b400" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#f5b400" stop-opacity="0" />
    </radialGradient>
    
    <!-- Neon Blue Gradient for Tech look -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Grid Pattern overlay -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Ambient Glow -->
  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Abstract Tech Circle and Lines -->
  <g transform="translate(400, 225)" stroke="#f5b400" stroke-opacity="0.2" fill="none">
    <circle r="120" stroke-width="1" stroke-dasharray="5,5" />
    <circle r="160" stroke-width="1.5" />
    <circle r="80" stroke-width="2" stroke-dasharray="10,15" />
    <path d="M -160,0 L 160,0 M 0,-160 L 0,160" stroke-opacity="0.1" />
  </g>

  <!-- Glowing Neural Nodes (representing AI Content Production) -->
  <g transform="translate(400, 225)">
    <!-- Connections -->
    <path d="M -80,-50 L 0,-100 L 80,-50 L 100,40 L 0,90 L -100,30 Z" stroke="url(#brand-grad)" stroke-width="1.5" stroke-opacity="0.4" fill="none" />
    <path d="M 0,-100 L 0,90 M -80,-50 L 100,40 M 80,-50 L -100,30" stroke="url(#blue-grad)" stroke-width="1" stroke-opacity="0.3" fill="none" />

    <!-- Core AI Hub -->
    <circle cx="0" cy="0" r="25" fill="#121212" stroke="url(#brand-grad)" stroke-width="3" />
    <!-- AI Chip icon inside core -->
    <path d="M -8,-8 H 8 V 8 H -8 Z" fill="none" stroke="#f5b400" stroke-width="2" />
    <path d="M -12,-4 H -8 M -12,0 H -8 M -12,4 H -8 M 8,-4 H 12 M 8,0 H 12 M 8,4 H 12 M -4,-12 V -8 M 0,-12 V -8 M 4,-12 V -8 M -4,8 V 12 M 0,8 V 12 M 4,8 V 12" stroke="#f5b400" stroke-width="1.5" />

    <!-- Outer Nodes -->
    <circle cx="0" cy="-100" r="8" fill="#f5b400" />
    <circle cx="80" cy="-50" r="6" fill="#00f2fe" />
    <circle cx="100" cy="40" r="8" fill="#f5b400" />
    <circle cx="0" cy="90" r="6" fill="#00f2fe" />
    <circle cx="-100" cy="30" r="8" fill="#f5b400" />
    <circle cx="-80" cy="-50" r="6" fill="#00f2fe" />
  </g>

  <!-- AI Content Badges/Cards floating -->
  <g transform="translate(120, 110)" opacity="0.85">
    <rect width="180" height="60" rx="10" fill="#141414" stroke="#f5b400" stroke-opacity="0.3" stroke-width="1" />
    <text x="15" y="36" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="start">توليد نصوص ذكية</text>
    <circle cx="150" cy="30" r="12" fill="#f5b400" fill-opacity="0.1" />
    <path d="M 145,30 H 155 M 150,25 V 35" stroke="#f5b400" stroke-width="1.5" />
  </g>

  <g transform="translate(500, 310)" opacity="0.85">
    <rect width="180" height="60" rx="10" fill="#141414" stroke="#00f2fe" stroke-opacity="0.3" stroke-width="1" />
    <text x="15" y="36" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="start">صناعة صور إبداعية</text>
    <circle cx="150" cy="30" r="12" fill="#00f2fe" fill-opacity="0.1" />
    <path d="M 144,32 L 148,27 L 151,30 L 156,24" stroke="#00f2fe" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Section Title / Center Branding Overlay -->
  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" letter-spacing="1" text-anchor="middle">إنتاج المحتوى بالذكاء الاصطناعي</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">AI CONTENT GENERATION</text>
</svg>
