<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#181818" />
    </linearGradient>

    <!-- Purple/Red Artistic Gradient -->
    <linearGradient id="art-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>

    <!-- Gold/Orange Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ff7b00" />
    </linearGradient>

    <!-- Soft Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Grid Pattern overlay -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Glow Background -->
  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Abstract Design Ruler & Composition Lines (representing Graphic Design) -->
  <g opacity="0.15" stroke="#ffffff" stroke-width="1" fill="none">
    <circle cx="400" cy="200" r="140" />
    <line x1="150" y1="200" x2="650" y2="200" />
    <line x1="400" y1="40" x2="400" y2="360" />
    <rect x="220" y="80" width="360" height="240" stroke-dasharray="4,4" />
    <!-- Diagonal golden ratio lines -->
    <line x1="220" y1="80" x2="580" y2="320" stroke="#f5b400" stroke-width="0.5" />
    <line x1="580" y1="80" x2="220" y2="320" stroke="#f5b400" stroke-width="0.5" />
  </g>

  <!-- Overlapping Mockup Poster 1 (Left, Angled) -->
  <g transform="translate(240, 200) rotate(-10) translate(-100, -130)">
    <!-- Shadow -->
    <rect x="4" y="4" width="180" height="250" rx="6" fill="#000000" opacity="0.5" filter="blur(4px)" />
    <!-- Main Card -->
    <rect width="180" height="250" rx="6" fill="#131313" stroke="#ff007f" stroke-opacity="0.4" stroke-width="1.5" />
    <!-- Content inside Poster -->
    <path d="M 20,40 Q 90,10 160,40" stroke="url(#art-grad)" stroke-width="4" fill="none" />
    <circle cx="90" cy="120" r="40" fill="url(#art-grad)" />
    <rect x="20" y="190" width="140" height="8" rx="2" fill="#ffffff" opacity="0.7" />
    <rect x="20" y="205" width="100" height="6" rx="2" fill="#ffffff" opacity="0.4" />
    <rect x="20" y="217" width="120" height="6" rx="2" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- Overlapping Mockup Poster 2 (Right, Angled) -->
  <g transform="translate(560, 200) rotate(10) translate(-100, -130)">
    <!-- Shadow -->
    <rect x="4" y="4" width="180" height="250" rx="6" fill="#000000" opacity="0.5" filter="blur(4px)" />
    <!-- Main Card -->
    <rect width="180" height="250" rx="6" fill="#131313" stroke="#f5b400" stroke-opacity="0.4" stroke-width="1.5" />
    <!-- Content inside Poster -->
    <polygon points="90,30 150,130 30,130" fill="url(#gold-grad)" opacity="0.8" />
    <circle cx="140" cy="70" r="20" fill="#ffffff" opacity="0.15" />
    <rect x="20" y="190" width="140" height="8" rx="2" fill="#ffffff" opacity="0.7" />
    <rect x="20" y="205" width="120" height="6" rx="2" fill="#ffffff" opacity="0.4" />
    <rect x="20" y="217" width="90" height="6" rx="2" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- Central Highlight Composition (Camera, Pen, Art, Poster theme) -->
  <g transform="translate(400, 200)">
    <circle r="45" fill="#121212" stroke="url(#gold-grad)" stroke-width="3" />
    <!-- Image/Palette Icon inside center -->
    <path d="M -15,-10 H 15 V 15 H -15 Z" fill="none" stroke="#f5b400" stroke-width="2.5" />
    <circle cx="-5" cy="-2" r="3" fill="#f5b400" />
    <path d="M -15,10 L -5,0 L 5,8 L 10,3 L 15,10 Z" fill="none" stroke="#f5b400" stroke-width="2" />
  </g>

  <!-- Typography / Poster labels in Arabic -->
  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" letter-spacing="1" text-anchor="middle">تصميم الصور والبوسترات الإعلانية</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">CREATIVE POSTERS &amp; ADS</text>
</svg>
