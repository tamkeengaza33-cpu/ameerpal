<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="violet-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Podcast style promo album cover art layout representation -->
  <g transform="translate(400, 195)">
    <!-- Square Cover mock-up -->
    <rect x="-110" y="-120" width="220" height="230" rx="12" fill="#151515" stroke="url(#violet-pink)" stroke-width="2.5" />
    
    <!-- Abstract gradient sphere core of art -->
    <circle cx="0" cy="-20" r="50" fill="url(#violet-pink)" opacity="0.9" />
    <!-- Wave lines crossing sphere representing promotion -->
    <path d="M -90,-20 Q -40,-60 10,-20 T 90,-20" fill="none" stroke="#fff" stroke-width="2" opacity="0.6" />
    <path d="M -90,0 Q -40,30 10,-10 T 90,10" fill="none" stroke="url(#brand-grad)" stroke-width="1.5" />

    <!-- Cover Typographic lines (English/Arabic placeholders stylized) -->
    <!-- Brand / Title of show inside art -->
    <rect x="-70" y="48" width="140" height="10" rx="2" fill="#ffffff" opacity="0.9" />
    <rect x="-50" y="65" width="100" height="6" rx="2" fill="url(#brand-grad)" />
    <rect x="-30" y="77" width="60" height="5" rx="1.5" fill="#ffffff" opacity="0.3" />

    <!-- Tiny Headphone / sound icon top right inside card -->
    <g transform="translate(75, -85)" stroke="#fff" stroke-width="1.5" fill="none">
      <path d="M -10,0 A 10,10 0 0,1 10,0" />
      <rect x="-12" y="0" width="4" height="6" rx="1" fill="#fff" />
      <rect x="8" y="0" width="4" height="6" rx="1" fill="#fff" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">غلاف ترويجي وبوستر لبرنامج إذاعي</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">RADIO PROMOTION COVER ART</text>
</svg>
