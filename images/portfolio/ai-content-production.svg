<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="cyan-magenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#da22ff" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#da22ff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#da22ff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- AI Content generation prompt input bar + text streaming representation -->
  <g transform="translate(400, 195)">
    <!-- Main interface card -->
    <rect x="-160" y="-110" width="320" height="210" rx="12" fill="#131313" stroke="url(#cyan-magenta)" stroke-width="2" />
    
    <!-- AI Sparkle Icon top center -->
    <g transform="translate(0, -75)">
      <path d="M 0,-15 Q 0,0 -15,0 Q 0,0 0,15 Q 0,0 15,0 Q 0,0 0,-15 Z" fill="url(#brand-grad)" />
      <path d="M -22,-5 Q -22,0 -27,0 Q -22,0 -22,5 Q -22,0 -17,0 Q -22,0 -22,-5 Z" fill="#00f2fe" />
    </g>

    <!-- Prompt Input bar mock representation -->
    <rect x="-130" y="-45" width="260" height="30" rx="8" fill="#1b1b1b" stroke="#333" stroke-width="1" />
    <rect x="-115" y="-33" width="130" height="6" rx="2" fill="#fff" opacity="0.6" />
    <!-- Flashing prompt cursor -->
    <rect x="20" y="-35" width="2" height="10" fill="url(#brand-grad)" />
    <!-- Generate Button inside input bar -->
    <rect x="80" y="-40" width="42" height="20" rx="4" fill="url(#cyan-magenta)" />
    <path d="M 96,-30 L 106,-30 M 101,-35 L 101,-25" stroke="#fff" stroke-width="1.5" />

    <!-- Output Generated Content (Streaming text block representation) -->
    <g transform="translate(-130, 10)">
      <!-- Card boundaries of stream -->
      <rect x="0" y="0" width="260" height="70" rx="6" fill="#161616" stroke="#2d2d2d" stroke-width="1" />
      
      <!-- Generated lines -->
      <rect x="15" y="15" width="230" height="6" rx="2" fill="#fff" opacity="0.8" />
      <rect x="15" y="27" width="210" height="6" rx="2" fill="#fff" opacity="0.8" />
      <rect x="15" y="39" width="170" height="6" rx="2" fill="url(#brand-grad)" />
      <rect x="15" y="51" width="120" height="5" rx="1.5" fill="#fff" opacity="0.3" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">إنتاج المحتوى الإبداعي بالذكاء الاصطناعي</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">AI GENERATIVE COPYWRITING</text>
</svg>
