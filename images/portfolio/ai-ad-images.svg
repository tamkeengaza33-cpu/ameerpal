<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="cyan-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Generative canvas layers mockup representation -->
  <g transform="translate(400, 195)">
    <!-- Canvas frame layers offset representation (Creative bento / stacked layers) -->
    <!-- Base background layer -->
    <g transform="translate(-40, -40)" opacity="0.4">
      <rect x="-100" y="-70" width="200" height="140" rx="8" fill="#111" stroke="#333" stroke-width="1.5" />
    </g>

    <!-- Mid layout vector layer -->
    <g transform="translate(-20, -20)" opacity="0.6">
      <rect x="-100" y="-70" width="200" height="140" rx="8" fill="#151515" stroke="url(#cyan-blue)" stroke-width="1.5" />
      <line x1="-80" y1="0" x2="80" y2="0" stroke="#222" />
    </g>

    <!-- Core top render active layer (the polished design) -->
    <g transform="translate(0, 0)">
      <rect x="-100" y="-70" width="200" height="140" rx="8" fill="#181818" stroke="url(#brand-grad)" stroke-width="2" />
      
      <!-- Generated image interior graphics (scenic mount and starry AI design) -->
      <path d="M -100,45 L -50,10 L 0,40 L 50,-10 L 100,40 L 100,70 L -100,70 Z" fill="url(#cyan-blue)" opacity="0.8" />
      <path d="M -100,30 L -30,5 L 20,35 L 70,-5 L 100,25 L 100,70 L -100,70 Z" fill="#111" opacity="0.4" />
      
      <!-- Golden AI sun/sparkle star -->
      <path d="M 0,-30 Q 0,-20 -10,-20 Q 0,-20 0,-10 Q 0,-20 10,-20 Q 0,-20 0,-30 Z" fill="url(#brand-grad)" />
      <circle cx="-50" cy="-35" r="1.5" fill="#fff" />
      <circle cx="50" cy="-45" r="2" fill="#fff" />
    </g>

    <!-- Magic Wand floating generator tool overlay -->
    <g transform="translate(100, 40) rotate(-35)">
      <!-- Wand handle -->
      <rect x="-3" y="-60" width="6" height="70" rx="3" fill="#1a1a1a" stroke="url(#brand-grad)" stroke-width="1" />
      <!-- Wand shining tip -->
      <rect x="-3" y="10" width="6" height="10" rx="1.5" fill="url(#brand-grad)" />
      <!-- Little sparkles -->
      <path d="M 0,25 Q 0,20 -5,20 Q 0,20 0,15 Q 0,20 5,20 Q 0,20 0,25 Z" fill="#fff" />
      <path d="M -15,15 Q -15,12 -18,12 Q -15,12 -15,9 Q -15,12 -12,12 Q -15,12 -15,15 Z" fill="#00f2fe" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">توليد الصور الإعلانية بالذكاء الاصطناعي</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">AI GENERATIVE AD GRAPHICS</text>
</svg>
