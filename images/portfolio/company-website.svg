<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="gold-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ff7b00" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5b400" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#f5b400" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Browser window mockup representing Website design -->
  <g transform="translate(400, 195)">
    <rect x="-180" y="-120" width="360" height="230" rx="12" fill="#131313" stroke="url(#gold-orange)" stroke-width="2.5" />
    
    <!-- Browser Top Bar Chrome -->
    <path d="M -180,-100 H 180" stroke="#2a2a2a" stroke-width="1" />
    <circle cx="-162" cy="-110" r="4" fill="#ff5f56" />
    <circle cx="-150" cy="-110" r="4" fill="#ffbd2e" />
    <circle cx="-138" cy="-110" r="4" fill="#27c93f" />
    <!-- Address Bar -->
    <rect x="-110" y="-115" width="220" height="10" rx="4" fill="#1c1c1c" />
    <text x="0" y="-107" fill="#888" font-family="monospace" font-size="7" text-anchor="middle">https://company-template.com</text>

    <!-- Page Content Grid -->
    <!-- Hero Header / Slogan -->
    <rect x="-150" y="-70" width="160" height="12" rx="3" fill="#fff" opacity="0.9" />
    <rect x="-150" y="-50" width="110" height="8" rx="2" fill="#fff" opacity="0.4" />
    <rect x="-150" y="-36" width="130" height="8" rx="2" fill="#fff" opacity="0.4" />
    <!-- CTA Button -->
    <rect x="-150" y="-15" width="70" height="20" rx="4" fill="url(#gold-orange)" />
    
    <!-- Hero Illustration right side of page -->
    <rect x="30" y="-70" width="120" height="85" rx="6" fill="#1d1d1d" stroke="#333" stroke-width="1" />
    <path d="M 30,5 Q 60,-30 110,-10 T 150,-40" fill="none" stroke="url(#gold-orange)" stroke-width="2.5" />
    <circle cx="80" cy="-40" r="12" fill="#fff" opacity="0.15" />
    
    <!-- Grid of Features below -->
    <g transform="translate(0, 45)">
      <rect x="-150" y="0" width="90" height="40" rx="5" fill="#191919" />
      <rect x="-140" y="8" width="50" height="5" rx="1.5" fill="#fff" opacity="0.6" />
      <rect x="-140" y="18" width="70" height="4" rx="1" fill="#fff" opacity="0.3" />
      <rect x="-140" y="26" width="30" height="4" rx="1" fill="url(#gold-orange)" />

      <rect x="-45" y="0" width="90" height="40" rx="5" fill="#191919" />
      <rect x="-35" y="8" width="50" height="5" rx="1.5" fill="#fff" opacity="0.6" />
      <rect x="-35" y="18" width="70" height="4" rx="1" fill="#fff" opacity="0.3" />
      <rect x="-35" y="26" width="30" height="4" rx="1" fill="url(#gold-orange)" />

      <rect x="60" y="0" width="90" height="40" rx="5" fill="#191919" />
      <rect x="70" y="8" width="50" height="5" rx="1.5" fill="#fff" opacity="0.6" />
      <rect x="70" y="18" width="70" height="4" rx="1" fill="#fff" opacity="0.3" />
      <rect x="70" y="26" width="30" height="4" rx="1" fill="url(#gold-orange)" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">موقع تعريفي لشركة خدمات</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">COMPANY WEB SERVICES</text>
</svg>
