<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="purple-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#da22ff" />
      <stop offset="100%" stop-color="#9733ee" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#da22ff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#da22ff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Mobile Reels Player view -->
  <g transform="translate(400, 190)">
    <!-- Vertically framed smartphone screen representing Reels -->
    <rect x="-70" y="-130" width="140" height="250" rx="16" fill="#141414" stroke="url(#purple-pink)" stroke-width="2.5" />
    
    <!-- Camera lens notch -->
    <circle cx="0" cy="-118" r="4" fill="#2d2d2d" />
    
    <!-- Video element (inside screen) - Sound waves or aesthetic visual -->
    <path d="M -55,-20 Q -20,-70 20,-30 T 55,-50" fill="none" stroke="url(#purple-pink)" stroke-width="3" opacity="0.8" />
    <path d="M -55,10 Q -20,-40 20,0 T 55,-20" fill="none" stroke="#fff" stroke-width="2" opacity="0.4" stroke-dasharray="4,4" />

    <!-- Play icon overlay -->
    <circle cx="0" cy="-30" r="22" fill="#000" opacity="0.5" />
    <polygon points="-5,-36 7,-30 -5,-24" fill="#fff" />

    <!-- Interface buttons representation right side inside phone -->
    <g transform="translate(50, 20)" fill="#fff" opacity="0.7">
      <circle cx="0" cy="-40" r="5" fill="#fff" />
      <text x="0" y="-30" font-size="6" text-anchor="middle" font-weight="bold">82K</text>

      <circle cx="0" cy="-15" r="5" fill="#fff" />
      <text x="0" y="-5" font-size="6" text-anchor="middle" font-weight="bold">1.2K</text>
      
      <circle cx="0" cy="10" r="5" fill="#fff" />
    </g>

    <!-- User details and text description bottom-left of video -->
    <g transform="translate(-55, 75)" fill="#fff">
      <rect x="0" y="0" width="50" height="6" rx="2" opacity="0.8" />
      <rect x="0" y="10" width="80" height="4" rx="2" opacity="0.5" />
      <rect x="0" y="18" width="60" height="4" rx="2" opacity="0.3" />
    </g>

    <!-- Floating Audio disk spinner right bottom -->
    <circle cx="50" cy="95" r="10" fill="#2d2d2d" stroke="#da22ff" stroke-width="1.5" />
    <circle cx="50" cy="95" r="4" fill="#fff" />
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">مونتاج فيديوهات Reels القصيرة</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">CREATIVE REELS &amp; SHORTS</text>
</svg>
