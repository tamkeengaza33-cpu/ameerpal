<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="cyan-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- E-commerce layout representation -->
  <g transform="translate(400, 195)">
    <!-- Main outer browser wireframe -->
    <rect x="-180" y="-120" width="360" height="230" rx="12" fill="#131313" stroke="url(#cyan-green)" stroke-width="2.5" />
    
    <!-- Browser Top Bar Chrome -->
    <path d="M -180,-100 H 180" stroke="#2a2a2a" stroke-width="1" />
    <circle cx="-162" cy="-110" r="4" fill="#ff5f56" />
    <circle cx="-150" cy="-110" r="4" fill="#ffbd2e" />
    <circle cx="-138" cy="-110" r="4" fill="#27c93f" />
    <!-- Address Bar -->
    <rect x="-110" y="-115" width="220" height="10" rx="4" fill="#1c1c1c" />
    <text x="0" y="-107" fill="#888" font-family="monospace" font-size="7" text-anchor="middle">https://store.ameer.pal</text>

    <!-- Header bar navigation -->
    <rect x="-160" y="-85" width="50" height="10" rx="2" fill="#fff" opacity="0.8" />
    <g transform="translate(140, -85)">
      <!-- Shopping Cart Icon representation -->
      <path d="M -20,-3 H -15 L -10,7 H 5 L 10,-3 Z" fill="none" stroke="url(#cyan-green)" stroke-width="1.5" />
      <circle cx="-8" cy="11" r="2.5" fill="#00f2fe" />
      <circle cx="3" cy="11" r="2.5" fill="#00f2fe" />
    </g>

    <!-- 2 Column Product grid inside page -->
    <!-- Column 1 (Product card left) -->
    <g transform="translate(-85, -15)">
      <rect x="-70" y="-45" width="140" height="155" rx="8" fill="#181818" stroke="#2d2d2d" stroke-width="1" />
      <!-- Product Image box -->
      <rect x="-60" y="-35" width="120" height="80" rx="6" fill="#111" />
      <!-- Isometric Product shape inside box -->
      <polygon points="-20,5 20,5 30,-25 -10,-25" fill="none" stroke="url(#cyan-green)" stroke-width="1.5" />
      <circle cx="10" cy="-10" r="8" fill="#ffffff" opacity="0.1" />

      <!-- Text details -->
      <rect x="-60" y="55" width="100" height="7" rx="1.5" fill="#fff" opacity="0.8" />
      <rect x="-60" y="68" width="60" height="5" rx="1.5" fill="#fff" opacity="0.3" />
      <!-- Price & Purchase Button -->
      <text x="-60" y="93" fill="url(#cyan-green)" font-family="sans-serif" font-size="10" font-weight="900">$29.00</text>
      <rect x="15" y="81" width="45" height="16" rx="3" fill="url(#cyan-green)" />
    </g>

    <!-- Column 2 (Product card right) -->
    <g transform="translate(85, -15)">
      <rect x="-70" y="-45" width="140" height="155" rx="8" fill="#181818" stroke="#2d2d2d" stroke-width="1" />
      <!-- Product Image box -->
      <rect x="-60" y="-35" width="120" height="80" rx="6" fill="#111" />
      <!-- Isometric Product shape inside box -->
      <polygon points="-20,5 20,5 30,-25 -10,-25" fill="none" stroke="url(#cyan-green)" stroke-width="1.5" />
      <circle cx="10" cy="-10" r="8" fill="#ffffff" opacity="0.1" />

      <!-- Text details -->
      <rect x="-60" y="55" width="100" height="7" rx="1.5" fill="#fff" opacity="0.8" />
      <rect x="-60" y="68" width="60" height="5" rx="1.5" fill="#fff" opacity="0.3" />
      <!-- Price & Purchase Button -->
      <text x="-60" y="93" fill="url(#cyan-green)" font-family="sans-serif" font-size="10" font-weight="900">$49.00</text>
      <rect x="15" y="81" width="45" height="16" rx="3" fill="url(#cyan-green)" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">متجر إلكتروني للمنتجات الرقمية</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">DIGITAL E-COMMERCE HUB</text>
</svg>
