<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9900" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9900" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Megaphone / Digital Content representation -->
  <g transform="translate(400, 195)">
    <!-- Tech Rings -->
    <circle r="120" fill="none" stroke="url(#brand-grad)" stroke-opacity="0.1" stroke-width="1" />
    <circle r="85" fill="none" stroke="#fff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="6,6" />

    <!-- Open book / course manual on bottom -->
    <g transform="translate(0, 50)">
      <path d="M -70,-10 C -40,-25 0,-15 0,-15 C 0,-15 40,-25 70,-10 L 60,15 C 30,0 0,10 0,10 C 0,10 -30,0 -60,15 Z" fill="#151515" stroke="url(#brand-grad)" stroke-width="2" />
      <line x1="0" y1="-15" x2="0" y2="10" stroke="url(#brand-grad)" stroke-width="1.5" />
    </g>

    <!-- Digital Megaphone representing media broadcast/content -->
    <g transform="translate(-10, -25) rotate(-15)">
      <!-- Megaphone body -->
      <path d="M -35,5 L -5,-5 L -5,25 L -35,15 Z" fill="#252525" stroke="#444" stroke-width="1.5" />
      <path d="M -5,-15 L 35,-30 L 35,50 L -5,35 Z" fill="url(#orange-grad)" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linejoin="round" />
      
      <!-- Megaphone handle -->
      <path d="M -25,12 L -25,32 L -15,32 L -15,10" fill="#1a1a1a" stroke="#444" stroke-width="1" />
      
      <!-- Soundwaves emanating -->
      <path d="M 50,-15 Q 65,10 50,35" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4" />
      <path d="M 60,-25 Q 85,10 60,45" fill="none" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round" />
      <path d="M 70,-35 Q 105,10 70,55" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.3" />
    </g>

    <!-- Glowing stars/ideas -->
    <path d="M 70,-60 Q 70,-50 60,-50 Q 70,-50 70,-40 Q 70,-50 80,-50 Q 70,-50 70,-60 Z" fill="url(#brand-grad)" />
    <circle cx="-60" cy="-30" r="4" fill="#ff5500" />
    <circle cx="-30" cy="-70" r="5" fill="#fff" />
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">كورس صناعة المحتوى الرقمي</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">DIGITAL CONTENT CREATION COURSE</text>
</svg>
