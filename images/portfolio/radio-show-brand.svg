<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="red-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ffaa00" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Radio Show Broadcast mic / waves representation -->
  <g transform="translate(400, 195)">
    <!-- Broadcast ring waves -->
    <circle r="120" fill="none" stroke="url(#red-orange)" stroke-opacity="0.1" stroke-width="1" />
    <circle r="95" fill="none" stroke="#fff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="8,8" />
    
    <!-- Outer Mic Stand -->
    <path d="M -35,-20 C -35,30 35,30 35,-20" fill="none" stroke="url(#brand-grad)" stroke-width="4.5" stroke-linecap="round" />
    <line x1="0" y1="28" x2="0" y2="75" stroke="url(#brand-grad)" stroke-width="5" />
    <rect x="-30" y="72" width="60" height="10" rx="4" fill="url(#brand-grad)" />

    <!-- Microphone body -->
    <rect x="-20" y="-70" width="40" height="75" rx="20" fill="#181818" stroke="url(#red-orange)" stroke-width="3" />
    <!-- Microphone grill inside -->
    <rect x="-16" y="-64" width="32" height="35" rx="8" fill="none" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5" />
    <g opacity="0.4" stroke="#fff" stroke-width="1">
      <line x1="-16" y1="-50" x2="16" y2="-50" />
      <line x1="-16" y1="-40" x2="16" y2="-40" />
      <line x1="-10" y1="-60" x2="-10" y2="-30" />
      <line x1="10" y1="-60" x2="10" y2="-30" />
      <line x1="0" y1="-60" x2="0" y2="-30" />
    </g>

    <!-- Metallic clip bar -->
    <rect x="-24" y="-20" width="48" height="6" rx="2" fill="url(#brand-grad)" />

    <!-- Radio waves emanating from mic -->
    <path d="M -50,-60 Q -75,-40 -50,-20" fill="none" stroke="url(#red-orange)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 50,-60 Q 75,-40 50,-20" fill="none" stroke="url(#red-orange)" stroke-width="2.5" stroke-linecap="round" />
    
    <path d="M -65,-75 Q -95,-40 -65,-5" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.3" />
    <path d="M 65,-75 Q 95,-40 65,-5" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.3" />

    <!-- LIVE tag flashing on top right -->
    <g transform="translate(90, -90)">
      <rect x="-25" y="-12" width="50" height="20" rx="4" fill="#ff0000" />
      <text x="0" y="2.5" fill="#fff" font-family="sans-serif" font-weight="900" font-size="9" text-anchor="middle">LIVE</text>
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">الهوية البصرية واللوجو لبرنامج إذاعي</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">RADIO STATION BRAND IDENTITY</text>
</svg>
