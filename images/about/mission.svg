<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    
    <!-- Gold/Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>

    <!-- Accent Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
    
    <!-- Tech/Energy color -->
    <linearGradient id="tech-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Grid overlay -->
  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Ambient Glow -->
  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Rocket / Message / Send Launch concept -->
  <g transform="translate(400, 200)">
    <!-- Tech Rings behind -->
    <circle r="120" fill="none" stroke="#00f2fe" stroke-opacity="0.1" stroke-width="1" />
    <circle r="80" fill="none" stroke="url(#brand-grad)" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="12,12" />

    <!-- Paper plane / Send icon style (representing delivering the message) -->
    <path d="M -60,40 L 0,-80 L 60,40 L 0,15 Z" fill="none" stroke="url(#brand-grad)" stroke-width="3" stroke-linejoin="round" />
    <path d="M 0,-80 V 15" stroke="url(#brand-grad)" stroke-width="2" stroke-dasharray="4,4" />

    <!-- Digital bits / Launch dust -->
    <g fill="#00f2fe" opacity="0.7">
      <circle cx="-30" cy="-20" r="4" />
      <circle cx="40" cy="-10" r="5" />
      <circle cx="-10" cy="50" r="3" />
      <circle cx="20" cy="65" r="4" />
    </g>

    <!-- Upward arrow and launch lines -->
    <path d="M -40,-110 L 0,-150 L 40,-110" fill="none" stroke="url(#tech-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="0" y1="-80" x2="0" y2="-150" stroke="url(#tech-grad)" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Typography -->
  <text x="400" y="375" fill="#ffffff" font-family="system-ui, sans-serif" font-size="24" font-weight="900" text-anchor="middle">رسالتنا السامية</text>
  <text x="400" y="400" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">OUR MISSION</text>
</svg>
