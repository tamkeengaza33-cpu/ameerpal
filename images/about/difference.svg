<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    
    <!-- Gold/Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>

    <!-- Purple Gradient representing Creativity -->
    <linearGradient id="creative-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#da22ff" />
      <stop offset="100%" stop-color="#9733ee" />
    </linearGradient>

    <!-- Ambient Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#da22ff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#da22ff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Grid overlay -->
  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Ambient Glow -->
  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Intersection of Tech & Art (Representing difference and uniqueness) -->
  <g transform="translate(400, 200)">
    <!-- Venn Diagram style intersecting circles -->
    <!-- Tech Circle (Left) -->
    <circle cx="-45" cy="0" r="85" fill="none" stroke="#f5b400" stroke-opacity="0.4" stroke-width="2" />
    <!-- Art Circle (Right) -->
    <circle cx="45" cy="0" r="85" fill="none" stroke="url(#creative-grad)" stroke-opacity="0.5" stroke-width="2.5" />

    <!-- Sparkle / Star in the center of intersection -->
    <g transform="translate(0, 0)">
      <path d="M 0,-35 Q 0,0 -35,0 Q 0,0 0,35 Q 0,0 35,0 Q 0,0 0,-35 Z" fill="url(#brand-grad)" />
      <circle cx="0" cy="0" r="8" fill="#ffffff" />
    </g>

    <!-- Decorative particles -->
    <circle cx="-130" cy="-40" r="5" fill="#f5b400" />
    <circle cx="130" cy="40" r="6" fill="#da22ff" />
    <circle cx="-100" cy="80" r="3" fill="#ffffff" />
    <circle cx="100" cy="-80" r="4" fill="#ffffff" />

    <!-- Connection lines -->
    <line x1="-130" y1="-40" x2="-45" y2="0" stroke="#f5b400" stroke-width="1" opacity="0.3" />
    <line x1="130" y1="40" x2="45" y2="0" stroke="#da22ff" stroke-width="1" opacity="0.3" />
  </g>

  <!-- Typography -->
  <text x="400" y="375" fill="#ffffff" font-family="system-ui, sans-serif" font-size="24" font-weight="900" text-anchor="middle">ما الذي يميزنا؟</text>
  <text x="400" y="400" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">OUR UNIQUENESS</text>
</svg>
