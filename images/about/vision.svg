<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    
    <!-- Gold/Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>

    <!-- Accent Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5b400" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#f5b400" stop-opacity="0" />
    </radialGradient>
    
    <!-- Blue/Teal accent -->
    <linearGradient id="tech-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Grid overlay -->
  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Ambient Glow -->
  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Eye of Vision / Horizon / Futuristic UI -->
  <g transform="translate(400, 210)">
    <!-- Concentric tech rings -->
    <circle r="140" fill="none" stroke="#f5b400" stroke-opacity="0.1" stroke-width="1" />
    <circle r="100" fill="none" stroke="url(#brand-grad)" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="10,10" />
    <circle r="60" fill="none" stroke="#00f2fe" stroke-opacity="0.2" stroke-width="1" />

    <!-- Stylized Eye curves (representing vision / looking forward) -->
    <path d="M -150,0 Q 0,-90 150,0 Q 0,90 -150,0 Z" fill="none" stroke="url(#brand-grad)" stroke-width="3" stroke-linecap="round" />
    
    <!-- Pupil / Globe -->
    <circle cx="0" cy="0" r="35" fill="#121212" stroke="url(#brand-grad)" stroke-width="2" />
    <circle cx="0" cy="0" r="15" fill="none" stroke="#00f2fe" stroke-width="2" />
    <circle cx="5" cy="-5" r="4" fill="#ffffff" />

    <!-- Tech HUD Elements floating -->
    <path d="M -90,-20 L -120,-40 H -150" stroke="#00f2fe" stroke-width="1.5" fill="none" opacity="0.7" />
    <text x="-155" y="-45" fill="#00f2fe" font-family="monospace" font-size="10" font-weight="bold" text-anchor="start">SYS_INT: ACTIVE</text>

    <path d="M 90,-20 L 120,-40 H 150" stroke="#f5b400" stroke-width="1.5" fill="none" opacity="0.7" />
    <text x="155" y="-45" fill="#f5b400" font-family="monospace" font-size="10" font-weight="bold" text-anchor="end">AI_FUTURE_SCAN</text>

    <!-- Scanning line vertical -->
    <line x1="-180" y1="0" x2="180" y2="0" stroke="url(#tech-grad)" stroke-width="1" opacity="0.3" stroke-dasharray="4,4" />
  </g>

  <!-- Typography -->
  <text x="400" y="375" fill="#ffffff" font-family="system-ui, sans-serif" font-size="24" font-weight="900" text-anchor="middle">رؤيتنا المستقبلية</text>
  <text x="400" y="400" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">OUR VISION</text>
</svg>
