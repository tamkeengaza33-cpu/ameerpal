<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="blue-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2387" />
      <stop offset="50%" stop-color="#e94057" />
      <stop offset="100%" stop-color="#f27121" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94057" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#e94057" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Social Media Instagram Mockup grid -->
  <g transform="translate(400, 200)">
    <!-- Main Center Post layout -->
    <rect x="-90" y="-120" width="180" height="230" rx="10" fill="#131313" stroke="url(#blue-pink)" stroke-width="2" />
    
    <!-- User header -->
    <circle cx="-65" cy="-100" r="12" fill="#252525" />
    <rect x="-45" y="-106" width="60" height="6" rx="2" fill="#fff" opacity="0.7" />
    <rect x="-45" y="-96" width="40" height="4" rx="2" fill="#fff" opacity="0.4" />
    
    <!-- Post Image Grid Box -->
    <rect x="-80" y="-80" width="160" height="110" rx="6" fill="url(#blue-pink)" opacity="0.9" />
    <!-- Wave graphics on post image representing visual layout -->
    <path d="M -80,10 Q -30,-40 20,0 T 80,-20 L 80,30 L -80,30 Z" fill="#121212" opacity="0.3" />
    <circle cx="45" cy="-45" r="16" fill="#ffffff" opacity="0.25" />

    <!-- Action Bar (Likes, Comments icons representation) -->
    <circle cx="-65" cy="45" r="5" fill="#e94057" />
    <circle cx="-48" cy="45" r="5" fill="#888" />
    <circle cx="-31" cy="45" r="5" fill="#888" />
    <rect x="-80" y="62" width="120" height="6" rx="2" fill="#fff" opacity="0.6" />
    <rect x="-80" y="74" width="70" height="5" rx="2" fill="#fff" opacity="0.3" />

    <!-- Floaters: Likes counter / Heart icon -->
    <g transform="translate(110, -30)" filter="drop-shadow(0px 4px 8px rgba(0,0,0,0.5))">
      <rect x="-35" y="-18" width="70" height="36" rx="8" fill="#e94057" />
      <text x="0" y="5" fill="#fff" font-family="sans-serif" font-size="12" font-weight="900" text-anchor="middle">❤️ +4.8k</text>
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">بوسترات السوشيال ميديا والهوية</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">SOCIAL BRAND PRESENCE</text>
</svg>
