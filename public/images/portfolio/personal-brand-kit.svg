<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="personal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Personal badge card & social assets mockup representation -->
  <g transform="translate(400, 195)">
    <!-- Main profile layout frame -->
    <rect x="-140" y="-110" width="280" height="210" rx="16" fill="#141414" stroke="url(#brand-grad)" stroke-width="2" />
    
    <!-- User portrait circle representation -->
    <circle cx="0" cy="-40" r="35" fill="#1a1a1a" stroke="url(#personal-grad)" stroke-width="2" />
    <!-- Stylized user bust icon -->
    <path d="M -20,-15 C -20,-25 20,-25 20,-15 C 20,-5 -20,-5 -20,-15 Z" fill="none" stroke="url(#personal-grad)" stroke-width="1.5" />
    <circle cx="0" cy="-45" r="12" fill="#2d2d2d" stroke="url(#brand-grad)" stroke-width="1" />

    <!-- Premium metallic crown/badge on top profile -->
    <path d="M -10,-88 L -5,-76 L 0,-88 L 5,-76 L 10,-88 L 7,-70 L -7,-70 Z" fill="url(#brand-grad)" />

    <!-- Personal Profile info lines below -->
    <rect x="-80" y="15" width="160" height="12" rx="3" fill="#fff" opacity="0.9" />
    <rect x="-50" y="34" width="100" height="6" rx="2" fill="url(#brand-grad)" />
    
    <!-- Social platforms icons links represented at footer of card -->
    <g transform="translate(0, 65)">
      <!-- Instagram box representation -->
      <rect x="-45" y="-10" width="20" height="20" rx="4" fill="#1b1b1b" stroke="#333" stroke-width="1" />
      <circle cx="-35" cy="0" r="4" fill="url(#brand-grad)" />

      <!-- LinkedIn representation -->
      <rect x="-10" y="-10" width="20" height="20" rx="4" fill="#1b1b1b" stroke="#333" stroke-width="1" />
      <text x="0" y="4" fill="url(#personal-grad)" font-family="sans-serif" font-weight="900" font-size="12" text-anchor="middle">in</text>

      <!-- Twitter / X representation -->
      <rect x="25" y="-10" width="20" height="20" rx="4" fill="#1b1b1b" stroke="#333" stroke-width="1" />
      <path d="M 31,-5 L 39,5 M 39,-5 L 31,5" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">حقيبة الهوية الشخصية للمؤثرين</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">INFLUENCER PERSONAL BRAND</text>
</svg>
