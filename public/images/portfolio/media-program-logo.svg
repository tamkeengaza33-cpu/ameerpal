<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="magenta-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f857a6" />
      <stop offset="100%" stop-color="#ff5858" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5858" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ff5858" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Media broadcast Speech Bubble / Audio Wave Logo construction -->
  <g transform="translate(400, 195)">
    <!-- Design compass layout circles -->
    <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" fill="none">
      <circle r="120" />
      <circle r="90" />
      <line x1="-140" y1="0" x2="140" y2="0" />
      <line x1="0" y1="-140" x2="0" y2="140" />
    </g>

    <!-- Constructing lines and nodes -->
    <circle cx="0" cy="-60" r="4" fill="#ff5858" />
    <circle cx="60" cy="30" r="4" fill="#f5b400" />
    <circle cx="-60" cy="30" r="4" fill="#f5b400" />
    
    <g stroke="url(#magenta-orange)" stroke-width="3" fill="none" opacity="0.3">
      <line x1="0" y1="-60" x2="60" y2="30" />
      <line x1="60" y1="30" x2="-60" y2="30" />
      <line x1="-60" y1="30" x2="0" y2="-60" />
    </g>

    <!-- Core Audio wave dynamic logo mark inside -->
    <g transform="translate(0, -10)">
      <!-- Wave segments styled as a majestic sound wave dialogue logo -->
      <path d="M -70,20 C -70,20 -50,-50 -20,-10 C 10,30 30,-30 50,20 C 60,35 70,30 70,30" fill="none" stroke="url(#magenta-orange)" stroke-width="10" stroke-linecap="round" />
      <path d="M -50,10 C -50,10 -30,-30 -10,-5 C 10,20 20,-15 40,10" fill="none" stroke="url(#brand-grad)" stroke-width="6" stroke-linecap="round" opacity="0.8" />
      <circle cx="-10" cy="-5" r="10" fill="#ffffff" />
    </g>

    <!-- Audio waveform indicators around logo represent program aspect -->
    <g transform="translate(-110, -50)">
      <rect x="0" y="0" width="3" height="30" fill="#ff5858" rx="1.5" />
      <rect x="8" y="5" width="3" height="20" fill="#f5b400" rx="1.5" />
      <rect x="16" y="10" width="3" height="10" fill="#fff" opacity="0.3" rx="1.5" />
    </g>

    <g transform="translate(90, -50)">
      <rect x="16" y="0" width="3" height="30" fill="#ff5858" rx="1.5" />
      <rect x="8" y="5" width="3" height="20" fill="#f5b400" rx="1.5" />
      <rect x="0" y="10" width="3" height="10" fill="#fff" opacity="0.3" rx="1.5" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">شعار برنامج بودكاست وحوارات إعلامية</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">MEDIA BROADCAST LOGO GRAPHICS</text>
</svg>
