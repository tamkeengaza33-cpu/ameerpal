<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="teal-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Kanban Board / Content Calendar representation -->
  <g transform="translate(400, 195)">
    <!-- Main Board Frame -->
    <rect x="-170" y="-120" width="340" height="230" rx="12" fill="#131313" stroke="url(#teal-blue)" stroke-width="2.5" />
    
    <!-- 3 Kanban Columns headers -->
    <!-- Column 1 Header: To-Do -->
    <rect x="-150" y="-100" width="90" height="20" rx="4" fill="#1b1b1b" />
    <circle cx="-135" cy="-90" r="4" fill="#ff5f56" />
    <rect x="-125" y="-93" width="50" height="6" rx="2" fill="#fff" opacity="0.8" />

    <!-- Column 2 Header: In Progress -->
    <rect x="-45" y="-100" width="90" height="20" rx="4" fill="#1b1b1b" />
    <circle cx="-30" cy="-90" r="4" fill="#ffbd2e" />
    <rect x="-20" y="-93" width="50" height="6" rx="2" fill="#fff" opacity="0.8" />

    <!-- Column 3 Header: Done -->
    <rect x="60" y="-100" width="90" height="20" rx="4" fill="#1b1b1b" />
    <circle cx="75" cy="-90" r="4" fill="#27c93f" />
    <rect x="85" y="-93" width="50" height="6" rx="2" fill="#fff" opacity="0.8" />

    <!-- Cards inside Column 1 (To Do) -->
    <g transform="translate(-150, -70)">
      <rect x="0" y="0" width="90" height="40" rx="5" fill="#181818" stroke="#2a2a2a" stroke-width="1" />
      <rect x="8" y="8" width="74" height="6" rx="1.5" fill="#fff" opacity="0.6" />
      <rect x="8" y="18" width="50" height="5" rx="1.5" fill="#fff" opacity="0.3" />
      <circle cx="75" cy="28" r="4" fill="#888" />

      <rect x="0" y="48" width="90" height="40" rx="5" fill="#181818" stroke="#2a2a2a" stroke-width="1" />
      <rect x="8" y="56" width="74" height="6" rx="1.5" fill="#fff" opacity="0.6" />
      <circle cx="75" cy="76" r="4" fill="#888" />
    </g>

    <!-- Cards inside Column 2 (In Progress) -->
    <g transform="translate(-45, -70)">
      <!-- Active Task with Brand accent -->
      <rect x="0" y="0" width="90" height="50" rx="5" fill="#1d1d1d" stroke="url(#brand-grad)" stroke-width="1.5" />
      <rect x="8" y="8" width="74" height="6" rx="1.5" fill="#fff" opacity="0.9" />
      <rect x="8" y="18" width="60" height="5" rx="1.5" fill="url(#brand-grad)" />
      <!-- Small icon inside card -->
      <path d="M 8,35 H 35" stroke="#fff" stroke-width="2" opacity="0.4" />
      <circle cx="75" cy="38" r="6" fill="url(#teal-blue)" />
    </g>

    <!-- Cards inside Column 3 (Done) -->
    <g transform="translate(60, -70)">
      <rect x="0" y="0" width="90" height="40" rx="5" fill="#161616" stroke="#2a2a2a" stroke-width="1" opacity="0.7" />
      <rect x="8" y="8" width="74" height="6" rx="1.5" fill="#fff" opacity="0.4" />
      <!-- Checkmark -->
      <path d="M 68,26 L 73,31 L 82,22" fill="none" stroke="#27c93f" stroke-width="2" />

      <rect x="0" y="48" width="90" height="40" rx="5" fill="#161616" stroke="#2a2a2a" stroke-width="1" opacity="0.7" />
      <rect x="8" y="56" width="74" height="6" rx="1.5" fill="#fff" opacity="0.4" />
      <!-- Checkmark -->
      <path d="M 68,74 L 73,79 L 82,70" fill="none" stroke="#27c93f" stroke-width="2" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">خطة محتوى شهرية لمنصة تعليمية</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">MONTHLY CONTENT STRATEGY</text>
</svg>
