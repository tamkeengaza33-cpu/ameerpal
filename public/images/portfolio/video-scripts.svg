<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5b400" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#f5b400" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Script Screenplay sheet, Fountain pen representation -->
  <g transform="translate(400, 195)">
    <!-- Tech boundary layout -->
    <circle r="120" fill="none" stroke="url(#brand-grad)" stroke-opacity="0.1" stroke-width="1.5" />

    <!-- Screenplay script sheet -->
    <g transform="rotate(-5)">
      <!-- Shadow -->
      <rect x="-76" y="-106" width="160" height="210" rx="6" fill="#000" opacity="0.6" />
      <!-- Main Paper Sheet -->
      <rect x="-80" y="-110" width="160" height="210" rx="6" fill="#151515" stroke="url(#brand-grad)" stroke-width="2" />
      
      <!-- Script text lines representing Dialogue / Hook / Call-to-action -->
      <g fill="#fff" opacity="0.8">
        <!-- HOOK header -->
        <rect x="-60" y="-85" width="45" height="10" rx="2" fill="url(#brand-grad)" />
        <rect x="-60" y="-68" width="120" height="6" rx="2" opacity="0.7" />
        <rect x="-60" y="-56" width="100" height="6" rx="2" opacity="0.4" />

        <!-- STORY DIALOGUE -->
        <rect x="-30" y="-30" width="60" height="10" rx="2" fill="#888" />
        <rect x="-50" y="-13" width="100" height="5" rx="1.5" opacity="0.5" />
        <rect x="-50" y="-2" width="100" height="5" rx="1.5" opacity="0.5" />
        <rect x="-50" y="9" width="80" height="5" rx="1.5" opacity="0.3" />

        <!-- CALL TO ACTION -->
        <rect x="-60" y="35" width="55" height="10" rx="2" fill="url(#brand-grad)" />
        <rect x="-60" y="52" width="120" height="6" rx="2" opacity="0.7" />
        <rect x="-60" y="64" width="70" height="5" rx="1.5" opacity="0.4" />
      </g>
    </g>

    <!-- Stylized Feather / Fountain Pen overlay -->
    <g transform="translate(70, 30) rotate(35)">
      <!-- Pen body -->
      <path d="M 0,-100 L 6,-10 L 0,0 L -6,-10 Z" fill="#2d2d2d" stroke="url(#brand-grad)" stroke-width="2" />
      <!-- Pen golden tip -->
      <polygon points="0,0 4,-12 -4,-12" fill="url(#brand-grad)" />
      <!-- Ink line -->
      <line x1="0" y1="-50" x2="0" y2="0" stroke="url(#brand-grad)" stroke-width="1.2" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">سكربتات الفيديوهات الإعلانية</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">COPYWRITING &amp; VIDEO SCRIPTS</text>
</svg>
