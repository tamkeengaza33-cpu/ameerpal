<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="cyan-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Video Editor Timeline & Screen Layout -->
  <g transform="translate(400, 200)">
    <!-- Video Monitor/Screen -->
    <rect x="-160" y="-130" width="320" height="180" rx="10" fill="#131313" stroke="url(#cyan-blue)" stroke-width="2.5" />
    
    <!-- Video Content Representation -->
    <!-- Inside the screen -->
    <circle cx="0" cy="-40" r="30" fill="url(#cyan-blue)" opacity="0.8" />
    <!-- Play symbol in center -->
    <polygon points="-8,-48 12,-40 -8,-32" fill="#fff" />
    <rect x="-140" y="20" width="280" height="6" rx="2" fill="#2d2d2d" />
    <rect x="-140" y="20" width="160" height="6" rx="2" fill="url(#cyan-blue)" />
    <!-- Audio waves or playback markers -->
    <circle cx="20" cy="23" r="4" fill="#00f2fe" />

    <!-- Audio meter sidebar right inside monitor -->
    <rect x="135" y="-110" width="8" height="110" rx="2" fill="#2d2d2d" />
    <rect x="135" y="-70" width="8" height="70" rx="2" fill="#32cd32" />
    
    <!-- Timeline section below -->
    <g transform="translate(0, 80)">
      <!-- Timeline bar background -->
      <rect x="-180" y="-15" width="360" height="40" rx="6" fill="#151515" stroke="#333" stroke-width="1" />
      <!-- Timeline tracks -->
      <rect x="-165" y="-5" width="90" height="10" rx="2" fill="url(#cyan-blue)" opacity="0.8" />
      <rect x="-70" y="-5" width="120" height="10" rx="2" fill="#f5b400" opacity="0.8" />
      <rect x="55" y="-5" width="110" height="10" rx="2" fill="#00f2fe" opacity="0.8" />

      <!-- Audio Track below -->
      <rect x="-165" y="10" width="330" height="6" rx="2" fill="#444" opacity="0.5" />
      <!-- Waveform graphic -->
      <path d="M -165,13 Q -150,5 -135,13 T -105,13 T -75,13 T -45,13 T -15,13 T 15,13 T 45,13 T 75,13 T 105,13 T 135,13" fill="none" stroke="#00f2fe" stroke-width="1.5" />

      <!-- Timeline Playhead needle -->
      <line x1="-30" y1="-22" x2="-30" y2="30" stroke="#ff416c" stroke-width="2" />
      <polygon points="-35,-22 -25,-22 -30,-15" fill="#ff416c" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">المونتاج والفيديو الإعلاني</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">PRODUCT VIDEO EDITING</text>
</svg>
