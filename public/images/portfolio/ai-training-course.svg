<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="purple-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#da22ff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- AI Brain + Learning Nodes representation -->
  <g transform="translate(400, 195)">
    <!-- Neural Network rings -->
    <circle r="120" fill="none" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1" />
    <circle r="90" fill="none" stroke="url(#brand-grad)" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8,8" />
    
    <!-- Stylized AI Neural Grid brain nodes -->
    <g stroke="url(#purple-blue)" stroke-width="1.5">
      <line x1="-50" y1="-30" x2="-20" y2="20" opacity="0.4" />
      <line x1="-20" y1="20" x2="40" y2="40" opacity="0.4" />
      <line x1="40" y1="40" x2="60" y2="-10" opacity="0.4" />
      <line x1="60" y1="-10" x2="10" y2="-50" opacity="0.4" />
      <line x1="10" y1="-50" x2="-50" y2="-30" opacity="0.4" />
      <!-- Crossing interconnects -->
      <line x1="-20" y1="20" x2="10" y2="-50" opacity="0.5" stroke="#f5b400" />
      <line x1="-50" y1="-30" x2="40" y2="40" opacity="0.5" stroke="#3b82f6" />
    </g>

    <!-- Glowing Node circles -->
    <circle cx="-50" cy="-30" r="10" fill="#da22ff" />
    <circle cx="-20" cy="20" r="14" fill="#3b82f6" />
    <circle cx="40" cy="40" r="12" fill="#f5b400" />
    <circle cx="60" cy="-10" r="8" fill="#fff" />
    <circle cx="10" cy="-50" r="16" fill="url(#purple-blue)" />

    <!-- Core AI Sparkle star inside main node -->
    <path d="M 10,-60 Q 10,-50 0,-50 Q 10,-50 10,-40 Q 10,-50 20,-50 Q 10,-50 10,-60 Z" fill="#fff" />

    <!-- Graduation/Learning cap symbol resting near the nodes representing training/courses -->
    <g transform="translate(-80, 50) rotate(-15)">
      <polygon points="0,-18 30,-5 0,8 -30,-5" fill="url(#brand-grad)" />
      <polygon points="-18,2 18,2 18,14 Q 0,22 -18,14 Z" fill="#131313" stroke="url(#brand-grad)" stroke-width="1.5" />
      <!-- Tassel -->
      <path d="M 30,-5 Q 35,5 30,15" fill="none" stroke="#fff" stroke-width="1.5" />
      <circle cx="30" cy="15" r="3" fill="#fff" />
    </g>
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">دورة أدوات الذكاء الاصطناعي</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">AI TOOLS TRAINING COURSE</text>
</svg>
