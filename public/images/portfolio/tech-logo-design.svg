<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#121212" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5b400" />
      <stop offset="100%" stop-color="#ffcc33" />
    </linearGradient>
    <linearGradient id="cyan-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" />

  <g opacity="0.04">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="225" r="300" fill="url(#glow)" />

  <!-- Logo design grid drawing board layout representation -->
  <g transform="translate(400, 195)">
    <!-- Tech grid lines -->
    <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" fill="none">
      <circle cx="0" cy="0" r="110" />
      <circle cx="0" cy="0" r="85" />
      <circle cx="0" cy="0" r="55" />
      <line x1="-150" y1="0" x2="150" y2="0" stroke-dasharray="3,3" />
      <line x1="0" y1="-150" x2="0" y2="150" stroke-dasharray="3,3" />
      <rect x="-85" y="-85" width="170" height="170" stroke-dasharray="4,4" />
      <!-- Radial angles guidelines -->
      <line x1="-100" y1="-100" x2="100" y2="100" stroke-dasharray="6,6" />
      <line x1="-100" y1="100" x2="100" y2="-100" stroke-dasharray="6,6" />
    </g>

    <!-- Caliper rulers & measurement vectors overlay (the craft element) -->
    <!-- Stylized vector node squares -->
    <rect x="-87" y="-87" width="4" height="4" fill="#00f2fe" stroke="#fff" stroke-width="0.5" />
    <rect x="83" y="83" width="4" height="4" fill="#00f2fe" stroke="#fff" stroke-width="0.5" />
    <rect x="83" y="-87" width="4" height="4" fill="#00f2fe" stroke="#fff" stroke-width="0.5" />
    <rect x="-87" y="83" width="4" height="4" fill="#00f2fe" stroke="#fff" stroke-width="0.5" />
    
    <!-- Measuring line -->
    <path d="M 85,0 L 115,35" stroke="url(#brand-grad)" stroke-width="1.2" />
    <circle cx="115" cy="35" r="3" fill="#f5b400" />
    <text x="125" y="38" fill="url(#brand-grad)" font-family="monospace" font-size="8" font-weight="bold">R: 85.00px</text>

    <!-- Core Tech Logo Glyphs in Cyan/Violet -->
    <g stroke="url(#cyan-violet)" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Infinity-like geometric helix tech logo -->
      <path d="M -45,-25 C -15,-25 15,25 45,25 C 70,25 70,-25 45,-25 C 15,-25 -15,25 -45,25 C -70,25 -70,-25 -45,-25 Z" />
    </g>
    <!-- Accent center glow core -->
    <circle cx="0" cy="0" r="10" fill="#fff" />
  </g>

  <text x="400" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="900" text-anchor="middle">تصميم شعار لشركة تكنولوجيا وبرمجيات</text>
  <text x="400" y="405" fill="#f5b400" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">GEOMETRIC TECH LOGO ART</text>
</svg>
